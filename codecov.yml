coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 5%

  # Carry forward flags so partial CI runs don't wipe coverage data.
  round: nearest
  precision: 2

ignore:
  - "src/__init__.py"
  - "src/main.py"
  - "tests/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
